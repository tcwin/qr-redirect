<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kommer snart</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h1 { font-size: 2rem; }
    p { color: #666; }
  </style>
</head>
<body>
  <h1>🚧 Kommer snart</h1>
  <p id="id-display"></p>
  <script>
    const id = window.location.pathname.split('/').pop();
    document.getElementById('id-display').textContent = 'ID: ' + id;
  </script>
</body>
</html>
